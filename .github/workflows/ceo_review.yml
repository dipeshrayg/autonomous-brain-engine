name: CEO Review

# The CEO meta-watchdog. Runs every 6 hours, examines the trajectory of recent
# projects, and writes strict directives that the next plan stage must obey.
# This is the layer ABOVE the per-project pipeline — it watches the watchdog.

on:
  schedule:
    # Once per day. The CEO is a slow-moving strategic watchdog, not a per-build
    # gate — running it 4x/day just produced "verdict after verdict" noise on the
    # dashboard. One review per day is plenty; it never blocks or fails a build.
    - cron: "11 19 * * *"      # 19:11 UTC
  workflow_dispatch:

permissions:
  contents: write              # commit ceo_reviews back to memory_log.json
  models: read                 # call GitHub Models (free LLM access)

concurrency:
  group: ceo-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout master repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai>=1.30.0

      - name: Run CEO review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python executive.py

      - name: Commit CEO review
        if: always()
        run: |
          git config user.name  "ceo-bot[autonomous-brain]"
          git config user.email "ceo-bot@users.noreply.github.com"
          git add memory_log.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No CEO review to commit."
            exit 0
          fi
          git commit -m "ceo: review @ $(date -u +%Y-%m-%dT%H:%MZ)"
          # Resilient push: integrate concurrent memory writes and retry instead of failing red.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — integrating concurrent changes..."
            git fetch origin main || true
            git pull --rebase origin main || git rebase --abort || true
            sleep $((attempt * 3))
          done
          echo "::warning::Could not push CEO review after 5 attempts. The next review will re-record. Not failing the build."
          exit 0

      - name: Sync public dashboard
        if: always()
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # CEO workflow only installs minimal deps; install dashboard deps too
          pip install requests
          python publish_public.py
