name: Daily Build

on:
  schedule:
    # Target: a new project every ~5 hours (up to 5/day, capped). Spread cron
    # attempts across the day at staggered minutes so GitHub's free-tier cron
    # delays don't all land in the same window. brain.py enforces:
    #   - >= 5 hours since the last project before a scheduled run does work
    #   - <= 5 projects per UTC day
    # All other schedule firings exit cleanly via idempotency.
    - cron: "11 2 * * *"       # 02:11 UTC  (~03:11 BST)  - slot 1
    - cron: "33 4 * * *"       # 04:33 UTC                - slot 1 backup
    - cron: "07 7 * * *"       # 07:07 UTC                - slot 2
    - cron: "47 9 * * *"       # 09:47 UTC                - slot 2 backup
    - cron: "23 12 * * *"      # 12:23 UTC                - slot 3
    - cron: "53 14 * * *"      # 14:53 UTC                - slot 3 backup
    - cron: "37 17 * * *"      # 17:37 UTC                - slot 4
    - cron: "11 20 * * *"      # 20:11 UTC                - slot 4 backup
    - cron: "43 22 * * *"      # 22:43 UTC                - slot 5
  workflow_dispatch:

permissions:
  contents: write              # commit memory_log.json back
  models: read                 # call GitHub Models (free)

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout master repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run brain
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_EVENT_NAME:  ${{ github.event_name }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_KEY:      ${{ secrets.GOOGLE_AI_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_RUN_ID:      ${{ github.run_id }}
        run: python brain.py

      - name: Commit memory log
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory_log.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          # Resilient push: other memory-writing workflows (CEO/CSO/self-improve) push to
          # main concurrently. A bare 'git push' loses that race and turns the run RED even
          # though brain.py succeeded. Integrate concurrent changes with rebase and retry.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — integrating concurrent changes..."
            git fetch origin main || true
            git pull --rebase origin main || git rebase --abort || true
            sleep $((attempt * 3))
          done
          echo "::warning::Could not push memory_log.json after 5 attempts (persistent concurrent writes). The next scheduled run will re-record. Not failing the build."
          exit 0

      - name: Sync public dashboard
        if: always()
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python publish_public.py
