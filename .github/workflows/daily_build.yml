name: Daily Build

on:
  schedule:
    # Goal: a new project must exist before 06:00 UTC (07:00 London BST) every
    # day. GitHub Actions cron firings are dropped/delayed by 30-90 min on the
    # free tier, so we saturate the pre-dawn window with 12 attempts. Combined
    # with brain.py's idempotency, only the first to actually fire creates the
    # project; the rest see today's entry in memory_log and exit cleanly.
    # The watchdog workflow (.github/workflows/watchdog.yml) is the safety net.
    - cron: "07 2 * * *"       # 02:07 UTC
    - cron: "29 2 * * *"       # 02:29 UTC
    - cron: "47 2 * * *"       # 02:47 UTC
    - cron: "11 3 * * *"       # 03:11 UTC
    - cron: "33 3 * * *"       # 03:33 UTC
    - cron: "53 3 * * *"       # 03:53 UTC
    - cron: "13 4 * * *"       # 04:13 UTC
    - cron: "37 4 * * *"       # 04:37 UTC
    - cron: "53 4 * * *"       # 04:53 UTC
    - cron: "11 5 * * *"       # 05:11 UTC
    - cron: "29 5 * * *"       # 05:29 UTC
    - cron: "47 5 * * *"       # 05:47 UTC
    # Mid-morning backup
    - cron: "23 9 * * *"       # 09:23 UTC
    # Afternoon block — for the SECOND daily project (target: 14-18 UTC)
    - cron: "11 14 * * *"      # 14:11 UTC
    - cron: "33 14 * * *"      # 14:33 UTC
    - cron: "53 14 * * *"      # 14:53 UTC
    - cron: "13 15 * * *"      # 15:13 UTC
    - cron: "37 15 * * *"      # 15:37 UTC
    - cron: "07 16 * * *"      # 16:07 UTC
    - cron: "29 16 * * *"      # 16:29 UTC
    - cron: "53 16 * * *"      # 16:53 UTC
    - cron: "17 17 * * *"      # 17:17 UTC
    - cron: "41 17 * * *"      # 17:41 UTC
    # Late evening safety net
    - cron: "23 18 * * *"      # 18:23 UTC
  workflow_dispatch:

permissions:
  contents: write              # commit memory_log.json back
  models: read                 # call GitHub Models (free)

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout master repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run brain
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_EVENT_NAME:  ${{ github.event_name }}
        run: python brain.py

      - name: Commit memory log + dashboard
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory_log.json README.md index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
            git push
          fi
