name: Daily Build

on:
  schedule:
    - cron: "17 6 * * *"       # 06:17 UTC primary (off :00 for reliability)
    - cron: "17 18 * * *"      # 18:17 UTC backup (no-ops if primary already ran)
  workflow_dispatch:

permissions:
  contents: write              # commit memory_log.json back
  models: read                 # call GitHub Models (free)

concurrency:
  group: daily-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout master repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run brain
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_EVENT_NAME:  ${{ github.event_name }}
        run: python brain.py

      - name: Commit memory log + dashboard
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory_log.json README.md index.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
            git push
          fi
