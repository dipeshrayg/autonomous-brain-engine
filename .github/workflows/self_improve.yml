name: Self-Improvement (CTO)

# The CTO meta-agent. Runs after every CEO review and after daily builds.
# Reads failure patterns from memory_log.json, reads the pipeline source,
# and patches its own code to fix recurring problems.
#
# This is the layer that gives the system true autonomy — it can fix
# its own prompts, its own verifier logic, and its own quality gates
# without any human intervention.

on:
  workflow_run:
    workflows: ["CEO Review"]
    types: [completed]
  schedule:
    - cron: "45 3 * * *"    # 03:45 UTC daily — after overnight builds
    - cron: "45 15 * * *"   # 15:45 UTC daily — midday check
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: self-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for accurate git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai>=1.30.0

      - name: Run CTO self-improvement
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
        run: python self_improve.py

      - name: Push any patches (resilient against concurrent memory writes)
        if: always()
        run: |
          git config user.name  "cto-bot[autonomous-brain]"
          git config user.email "cto-bot@users.noreply.github.com"
          # Nothing staged by self_improve? Then there may still be local commits to push.
          if git diff --quiet && git diff --staged --quiet && git rev-parse @{u} >/dev/null 2>&1 && [ "$(git rev-list @{u}..HEAD --count)" = "0" ]; then
            echo "Nothing to push."
            exit 0
          fi
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — integrating concurrent changes..."
            git fetch origin main || true
            git pull --rebase origin main || git rebase --abort || true
            sleep $((attempt * 3))
          done
          echo "::warning::Could not push self-improve patch after 5 attempts. Not failing the build."
          exit 0
