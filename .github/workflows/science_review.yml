name: Science Review

# Chief Science Officer (CSO) periodic audit. Project Evolution: this is the
# experimental edge-case driver, NOT a security review (security has been
# purged). The CSO pushes for algorithmic novelty and deep-tech ambition.

on:
  schedule:
    # Once per day — same rationale as the CEO review: reduce verdict noise.
    - cron: "29 16 * * *"      # 16:29 UTC
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: cso-review
  cancel-in-progress: false

jobs:
  science_review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout master repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai>=1.30.0

      - name: Run CSO science review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_AI_KEY: ${{ secrets.GOOGLE_AI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python executive.py cso

      - name: Commit CSO review
        if: always()
        run: |
          git config user.name  "cso-bot[autonomous-brain]"
          git config user.email "cso-bot@users.noreply.github.com"
          git add memory_log.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No CSO review to commit."
            exit 0
          fi
          git commit -m "cso: science review @ $(date -u +%Y-%m-%dT%H:%MZ)"
          # Resilient push: integrate concurrent memory writes and retry instead of failing red.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — integrating concurrent changes..."
            git fetch origin main || true
            git pull --rebase origin main || git rebase --abort || true
            sleep $((attempt * 3))
          done
          echo "::warning::Could not push CSO review after 5 attempts. The next review will re-record. Not failing the build."
          exit 0

      - name: Sync public dashboard
        if: always()
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          pip install requests
          python publish_public.py
